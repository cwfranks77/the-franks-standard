<svg xmlns="http://www.w3.org/2000/svg" width="800" height="520" viewBox="0 0 800 520" fill="none" role="img" aria-label="Guitars and gear on a neon stage">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070412"/>
      <stop offset="0.6" stop-color="#150a28"/>
      <stop offset="1" stop-color="#061b22"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffd84d"/>
      <stop offset="0.5" stop-color="#00e0ff"/>
      <stop offset="1" stop-color="#ff2d7a"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="800" height="520" rx="28" fill="url(#bg)"/>
  <rect x="18" y="18" width="764" height="484" rx="22" fill="none" stroke="url(#edge)" stroke-width="2" opacity="0.75"/>

  <!-- Amp stack -->
  <g opacity="0.95">
    <rect x="86" y="210" width="210" height="220" rx="18" fill="#0f0c1c" stroke="rgba(0,224,255,0.28)" stroke-width="2"/>
    <rect x="112" y="236" width="158" height="70" rx="12" fill="#1a1a2e"/>
    <rect x="112" y="322" width="158" height="10" rx="5" fill="#3a3640"/>
    <rect x="112" y="346" width="130" height="10" rx="5" fill="#2e2a35"/>
  </g>

  <!-- Guitar silhouette -->
  <g filter="url(#glow)" opacity="0.92">
    <path d="M520 120c22 0 42 16 42 38 0 14-8 26-18 32l-8 120c18 10 32 28 32 52 0 34-28 62-62 62-26 0-48-16-58-38l-42 6c-8 1-16-4-18-12l-6-34c-2-8 4-16 12-18l44-8c4-20 16-36 32-46l10-116c-10-8-16-18-16-30 0-22 18-40 40-40z"
      fill="#12121f" stroke="url(#edge)" stroke-width="2"/>
    <rect x="520" y="112" width="18" height="52" rx="6" fill="#1f1f30" />
    <rect x="520" y="108" width="18" height="8" rx="4" fill="#ffd84d" opacity="0.7"/>
  </g>

  <!-- Picks / details -->
  <g opacity="0.9">
    <path d="M650 290c18 0 34 14 34 32 0 18-16 44-34 72-18-28-34-54-34-72 0-18 16-32 34-32z" fill="rgba(255,45,122,0.14)" stroke="rgba(255,45,122,0.55)" stroke-width="2"/>
    <path d="M664 328l-16 16" stroke="#ff2d7a" stroke-width="2" stroke-linecap="round"/>
    <path d="M636 328l16 16" stroke="#ff2d7a" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>

