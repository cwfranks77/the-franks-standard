<svg xmlns="http://www.w3.org/2000/svg" width="800" height="520" viewBox="0 0 800 520" fill="none" role="img" aria-label="Coins and currency with proof-first styling">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070412"/>
      <stop offset="0.55" stop-color="#120820"/>
      <stop offset="1" stop-color="#061b22"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffd84d"/>
      <stop offset="0.5" stop-color="#00e0ff"/>
      <stop offset="1" stop-color="#ff2d7a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="520" rx="28" fill="url(#bg)"/>
  <rect x="18" y="18" width="764" height="484" rx="22" fill="none" stroke="url(#edge)" stroke-width="2" opacity="0.75"/>

  <!-- Coin stacks -->
  <g opacity="0.95">
    <ellipse cx="260" cy="340" rx="120" ry="34" fill="rgba(0,0,0,0.35)"/>
    <ellipse cx="540" cy="340" rx="120" ry="34" fill="rgba(0,0,0,0.35)"/>
    <g>
      <circle cx="240" cy="250" r="84" fill="#0f0c1c" stroke="rgba(255,216,77,0.7)" stroke-width="3"/>
      <circle cx="240" cy="250" r="64" fill="#12121f" stroke="rgba(0,224,255,0.3)" stroke-width="2"/>
      <path d="M206 252h68" stroke="#ffd84d" stroke-width="6" stroke-linecap="round" opacity="0.75"/>
    </g>
    <g>
      <circle cx="520" cy="250" r="84" fill="#0f0c1c" stroke="rgba(0,224,255,0.7)" stroke-width="3"/>
      <circle cx="520" cy="250" r="64" fill="#12121f" stroke="rgba(255,45,122,0.28)" stroke-width="2"/>
      <path d="M490 232l60 36" stroke="#00e0ff" stroke-width="6" stroke-linecap="round" opacity="0.75"/>
    </g>
  </g>

  <!-- Proof strip -->
  <g opacity="0.9">
    <rect x="170" y="392" width="460" height="72" rx="18" fill="#0f0c1c" stroke="rgba(0,224,255,0.22)" stroke-width="2"/>
    <rect x="200" y="416" width="300" height="10" rx="5" fill="#2e2a35"/>
    <rect x="200" y="438" width="220" height="10" rx="5" fill="#3a3640"/>
    <circle cx="590" cy="428" r="18" fill="rgba(46,204,113,0.2)" stroke="rgba(46,204,113,0.7)" stroke-width="2"/>
    <path d="M583 428l6 6 12-14" stroke="#2ecc71" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>

