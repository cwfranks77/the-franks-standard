<svg xmlns="http://www.w3.org/2000/svg" width="800" height="520" viewBox="0 0 800 520" fill="none" role="img" aria-label="Watches and jewelry in a trusted showcase">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0518"/>
      <stop offset="0.55" stop-color="#120820"/>
      <stop offset="1" stop-color="#061b22"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffd84d"/>
      <stop offset="0.5" stop-color="#00e0ff"/>
      <stop offset="1" stop-color="#ff2d7a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="520" rx="28" fill="url(#bg)"/>
  <rect x="18" y="18" width="764" height="484" rx="22" fill="none" stroke="url(#edge)" stroke-width="2" opacity="0.75"/>

  <!-- Watch body -->
  <g opacity="0.96">
    <rect x="348" y="80" width="104" height="360" rx="28" fill="#0f0c1c" stroke="rgba(255,216,77,0.28)" stroke-width="2"/>
    <circle cx="400" cy="260" r="116" fill="#12121f" stroke="url(#edge)" stroke-width="2"/>
    <circle cx="400" cy="260" r="92" fill="#0f0c1c" stroke="rgba(0,224,255,0.26)" stroke-width="2"/>
    <path d="M400 260 L400 200" stroke="#ffd84d" stroke-width="4" stroke-linecap="round"/>
    <path d="M400 260 L448 288" stroke="#00e0ff" stroke-width="4" stroke-linecap="round"/>
    <circle cx="400" cy="260" r="6" fill="#ff2d7a"/>
  </g>

  <!-- Trust marker -->
  <g opacity="0.9">
    <rect x="110" y="340" width="210" height="70" rx="16" fill="#0f0c1c" stroke="rgba(46,204,113,0.28)" stroke-width="2"/>
    <circle cx="140" cy="375" r="16" fill="rgba(46,204,113,0.18)" stroke="rgba(46,204,113,0.7)" stroke-width="2"/>
    <path d="M134 375l6 6 12-14" stroke="#2ecc71" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="170" y="362" width="130" height="10" rx="5" fill="#2e2a35"/>
    <rect x="170" y="382" width="92" height="10" rx="5" fill="#3a3640"/>
  </g>
</svg>

