<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="The Franks Standard authenticity seal">
  <defs>
    <linearGradient id="seal-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5e6b8"/>
      <stop offset="45%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#7a5c12"/>
    </linearGradient>
    <radialGradient id="seal-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a2332"/>
      <stop offset="100%" stop-color="#0a0e14"/>
    </radialGradient>
    <filter id="seal-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>
  <circle cx="100" cy="100" r="96" fill="url(#seal-glow)" stroke="url(#seal-gold)" stroke-width="4" filter="url(#seal-shadow)"/>
  <circle cx="100" cy="100" r="82" fill="none" stroke="url(#seal-gold)" stroke-width="1.5" stroke-dasharray="4 3"/>
  <circle cx="100" cy="100" r="68" fill="none" stroke="#047857" stroke-width="2" opacity="0.85"/>
  <path d="M100 28 L168 68 V132 L100 172 L32 132 V68 Z" fill="none" stroke="url(#seal-gold)" stroke-width="2.5" stroke-linejoin="round"/>
  <path d="M100 44 L56 72 V128 L100 152 L144 128 V72 Z" fill="rgba(201,168,76,0.12)" stroke="url(#seal-gold)" stroke-width="1.25"/>
  <text x="100" y="88" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="700" fill="url(#seal-gold)" letter-spacing="2">THE FRANKS</text>
  <text x="100" y="104" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="700" fill="url(#seal-gold)" letter-spacing="2">STANDARD</text>
  <text x="100" y="124" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#9ca3af" letter-spacing="1.5">AUTHENTICITY REGISTRY</text>
  <text x="100" y="140" text-anchor="middle" font-family="Georgia, serif" font-size="7" fill="#6ee7b7" letter-spacing="1">ORIGINAL PLATFORM ISSUE</text>
</svg>
