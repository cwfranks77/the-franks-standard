<!-- TFS owner error overlay shell (injected by error-overlay.js) -->
<div class="tfs-err-overlay" id="tfs-err-overlay" hidden role="alertdialog" aria-modal="true" aria-labelledby="tfs-err-title">
  <div class="tfs-err-overlay__backdrop" id="tfs-err-backdrop"></div>
  <div class="tfs-err-overlay__panel">
    <h2 id="tfs-err-title">Something went wrong</h2>
    <p class="tfs-err-overlay__body" id="tfs-err-body"></p>
    <div class="tfs-err-overlay__actions">
      <button type="button" class="owner-btn" id="tfs-err-copy">Copy Error</button>
      <button type="button" class="owner-btn owner-btn--primary" id="tfs-err-report">Report Issue</button>
      <button type="button" class="owner-btn" id="tfs-err-close">Dismiss</button>
    </div>
  </div>
</div>
