<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>eBay seller lookup — The Franks Standard</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="icon" type="image/png" href="/franks-pavilion.png" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      background: #f3f4f6;
      color: #111827;
      line-height: 1.5;
    }
    .wrap { max-width: 720px; margin: 0 auto; padding: 24px 16px 48px; }
    h1 { font-size: 1.5rem; margin: 0 0 8px; }
    .sub { color: #4b5563; margin-bottom: 20px; }
    label { display: block; font-weight: 700; margin-bottom: 8px; }
    textarea {
      width: 100%;
      min-height: 120px;
      padding: 12px;
      font-size: 16px;
      border: 2px solid #9ca3af;
      border-radius: 10px;
    }
    button {
      width: 100%;
      margin-top: 12px;
      padding: 16px;
      font-size: 1.05rem;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      background: linear-gradient(180deg, #ffd814, #f7ca00);
      color: #111;
      cursor: pointer;
    }
    #status {
      margin-top: 14px;
      padding: 14px;
      border-radius: 8px;
      font-weight: 600;
      display: none;
    }
    #status.ok { display: block; background: #ecfdf5; border: 2px solid #22c55e; color: #14532d; }
    #status.warn { display: block; background: #fffbeb; border: 2px solid #f59e0b; color: #78350f; }
    #results { margin-top: 20px; display: none; }
    #results.show { display: block; }
    .card {
      background: #fff;
      border: 2px solid #22c55e;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .name { font-size: 1.2rem; font-weight: 800; margin-bottom: 12px; word-break: break-all; }
    .btn-google {
      display: block;
      text-align: center;
      padding: 14px;
      margin-bottom: 10px;
      background: #f7ca00;
      color: #111;
      font-weight: 800;
      text-decoration: none;
      border-radius: 10px;
    }
    .links a { color: #146eb4; font-weight: 600; margin-right: 14px; }
    .back { margin-top: 24px; font-size: 0.9rem; }
    .back a { color: #146eb4; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>eBay seller → Google + links</h1>
    <p class="sub">Standalone tool (no app cache). Paste store link (<code>/str/</code>), profile (<code>/usr/</code>), or username.</p>

    <label for="paste">Paste seller URL or username</label>
    <textarea id="paste" placeholder="https://www.ebay.com/str/microbaycoins"></textarea>
    <button type="button" id="buildBtn">Build Google + eBay links</button>
    <p id="status"></p>
    <div id="results"></div>

    <p class="back"><a href="/ops/panel">← Operator console</a> · <a href="/ops/seller-lookup">Vue page</a></p>
  </div>

  <script>
    function googleUrl (username) {
      const q = '"' + username + '" ebay seller collectibles instagram OR facebook OR contact OR website'
      return 'https://www.google.com/search?q=' + encodeURIComponent(q)
    }

    function physicalUrl (username) {
      const q = '"' + username + '" (ebay store OR "ebay.com/str" OR collectibles) ("address" OR "hours" OR "visit us" OR "located at" OR storefront)'
      return 'https://www.google.com/search?q=' + encodeURIComponent(q)
    }

    function mapsUrl (username) {
      const label = String(username || '').replace(/[-_]/g, ' ')
      const q = label + ' sports cards OR coin shop OR collectibles store'
      return 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(q)
    }

    function parsePaste (text) {
      const seen = new Set()
      const rows = []
      const raw = String(text || '').trim()
      if (!raw) return rows

      function clean (id) {
        let u = String(id || '').trim().replace(/^@/, '')
        try { u = decodeURIComponent(u) } catch (e) {}
        u = u.replace(/^https?:\/\/(www\.)?ebay\.com\/(?:usr|str)\//i, '')
        u = u.split(/[/?#&]/)[0].replace(/[^\w.-]/g, '')
        if (!u || u.length < 2 || u.length > 64) return null
        if (!/^[A-Za-z0-9._-]+$/.test(u)) return null
        return u
      }

      function add (id, isStore) {
        const u = clean(id)
        if (!u) return
        const key = u.toLowerCase()
        if (seen.has(key)) return
        seen.add(key)
        rows.push({
          username: u,
          isStore: !!isStore,
          profile: 'https://www.ebay.com/usr/' + encodeURIComponent(u),
          store: isStore
            ? 'https://www.ebay.com/str/' + encodeURIComponent(u)
            : 'https://www.ebay.com/sch/i.html?_ssn=' + encodeURIComponent(u) + '&_ipg=60&rt=nc',
          google: googleUrl(u),
          physical: physicalUrl(u),
          maps: mapsUrl(u),
        })
      }

      function scan (chunk) {
        let m
        const usr = /ebay\.com\/usr\/([A-Za-z0-9._%-]{2,64})/gi
        while ((m = usr.exec(chunk)) !== null) add(m[1], false)
        const str = /ebay\.com\/str\/([A-Za-z0-9._%-]{2,64})/gi
        while ((m = str.exec(chunk)) !== null) add(m[1], true)
        const ssn = /[?&]_ssn=([A-Za-z0-9._%-]{2,64})/gi
        while ((m = ssn.exec(chunk)) !== null) add(m[1], false)
      }

      scan(raw)
      raw.split(/\r?\n/).forEach(function (line) {
        line = line.trim()
        if (!line) return
        if (/ebay\.com\/(str|usr)\//i.test(line)) { scan(line); return }
        line.split(/[,;\t|]+/).forEach(function (part) {
          part = part.trim()
          if (!part) return
          if (/ebay\.com\//i.test(part)) scan(part)
          else add(part, false)
        })
      })
      return rows
    }

    function render (rows) {
      const status = document.getElementById('status')
      const box = document.getElementById('results')
      status.className = ''
      box.className = ''
      box.innerHTML = ''

      if (!rows.length) {
        status.className = 'warn'
        status.textContent = 'No seller found. Paste a store link like ebay.com/str/microbaycoins or a username.'
        return
      }

      status.className = 'ok'
      status.textContent = 'Built ' + rows.length + ' seller link(s) — tap Google below.'
      box.className = 'show'
      rows.forEach(function (r) {
        const card = document.createElement('div')
        card.className = 'card'
        card.innerHTML =
          '<div class="name">' + r.username + '</div>' +
          '<a class="btn-google" href="' + r.physical + '" target="_blank" rel="noopener">Physical store ↗</a>' +
          '<a class="btn-google" href="' + r.maps + '" target="_blank" rel="noopener" style="margin-top:6px">Google Maps ↗</a>' +
          '<a class="btn-google" href="' + r.google + '" target="_blank" rel="noopener" style="margin-top:6px;opacity:.85">Contact / IG ↗</a>' +
          '<div class="links">' +
          '<a href="' + r.store + '" target="_blank" rel="noopener">' + (r.isStore ? 'eBay store' : 'Listings') + '</a>' +
          '<a href="' + r.profile + '" target="_blank" rel="noopener">eBay profile</a>' +
          '</div>'
        box.appendChild(card)
      })
      box.scrollIntoView({ behavior: 'smooth', block: 'start' })
    }

    function build () {
      render(parsePaste(document.getElementById('paste').value))
    }

    document.getElementById('buildBtn').addEventListener('click', build)
    document.getElementById('paste').addEventListener('keydown', function (e) {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); build() }
    })

    ;(function init () {
      const params = new URLSearchParams(location.search)
      const url = params.get('url') || params.get('q') || ''
      if (url) {
        document.getElementById('paste').value = url
        build()
      }
    })()
  </script>
</body>
</html>
