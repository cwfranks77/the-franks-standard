# Publishes the same Nuxt static build to cwfranks77/bcpoweraudio for www.bcpoweraudio.com
# (GitHub Pages allows one custom domain per repo; thefranksstandard.com stays on the-franks-standard.)
name: Deploy B&C to bcpoweraudio.com

on:
  push:
    branches: [main, master]
    paths:
      - 'pages/bc-audio/**'
      - 'pages/index.vue'
      - 'content/**'
      - 'src/content/**'
      - 'public/catalog/**'
      - 'package.json'
      - 'composables/useBcProductCatalog.js'
      - 'utils/bcProductImage.js'
      - 'scripts/import-petra-prodlist.cjs'
      - 'scripts/deploy-ai-voice-agent.cjs'
      - 'scripts/deploy-franks-voice.cjs'
      - 'scripts/twilio-voice-lib.cjs'
      - 'composables/useBcDropshipCatalog.js'
      - 'utils/supportContacts.js'
      - 'middleware/**'
      - 'utils/bcPrimarySite.js'
      - 'plugins/bc-domain-host.client.js'
      - 'plugins/bc-https-canonical.client.js'
      - 'components/BcAudioNav.vue'
      - 'components/OperatorUnlockModal.vue'
      - 'composables/useOpsLogoKnock.ts'
      - 'layouts/bc-audio.vue'
      - 'components/BcAiSupportDrawer.vue'
      - 'composables/useBcAiSupport.ts'
      - 'composables/useBcTheme.ts'
      - 'utils/bcSupport.js'
      - 'docs/BC-PHONE-SETUP.md'
      - 'middleware/bc-ops-host.ts'
      - 'middleware/bc-ops-auth.ts'
      - 'app.vue'
      - 'components/BcOpsStoreEditor.vue'
      - 'server/api/ops/bc-orders.get.ts'
      - 'server/utils/ownerCms.ts'
      - 'composables/useOpsUnlock.ts'
      - 'composables/useOpsSession.ts'
      - 'composables/useOpsApi.ts'
      - 'utils/publicSupabase.js'
      - 'plugins/ops-error-capture.client.ts'
      - 'utils/opsClientAuth.js'
      - 'utils/sha256Browser.js'
      - 'supabase/functions/ops-cms-action/**'
      - 'utils/bcSeo.js'
      - 'utils/bcMetaDefaults.js'
      - 'utils/siteSocial.js'
      - 'composables/useBcSiteMeta.ts'
      - 'composables/useBcPublicSiteContent.ts'
      - 'scripts/generate-bc-sitemap.cjs'
      - 'middleware/bc-ops-gate.ts'
      - 'pages/bc-audio/product/**'
      - 'components/BcProductCatalogGrid.vue'
      - 'scripts/patch-gh-pages-spa.cjs'
      - 'scripts/inject-spa-fallback.cjs'
      - 'scripts/configure-bcpoweraudio-github-pages.cjs'
      - 'nuxt.config.ts'
      - '.github/workflows/deploy-bcpoweraudio-site.yml'
  workflow_dispatch:

permissions:
  contents: write

# Cross-repo deploy needs a PAT with repo scope on cwfranks77/bcpoweraudio.
# Add repository secret BC_DEPLOY_PAT (or disable this workflow; manual gh-pages push works).

concurrency:
  group: pages-bcpoweraudio
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install
        run: npm install --no-audit --no-fund

      - name: Build static site
        env:
          NUXT_PUBLIC_SUPABASE_URL: ${{ secrets.NUXT_PUBLIC_SUPABASE_URL }}
          NUXT_PUBLIC_SUPABASE_KEY: ${{ secrets.NUXT_PUBLIC_SUPABASE_KEY }}
          NUXT_PUBLIC_SITE_URL: https://www.bcpoweraudio.com
          NUXT_PUBLIC_BC_AUDIO_EXTERNAL_URL: https://www.bcpoweraudio.com
          NUXT_PUBLIC_BC_AUDIO_SUPPORT_PHONE: ${{ secrets.NUXT_PUBLIC_BC_AUDIO_SUPPORT_PHONE }}
          NUXT_PUBLIC_BC_AUDIO_SUPPORT_TEL: ${{ secrets.NUXT_PUBLIC_BC_AUDIO_SUPPORT_TEL }}
          NUXT_PUBLIC_BC_AUDIO_SUPPORT_EMAIL: bc-audio@thefranksstandard.com
          NUXT_PUBLIC_OPS_ACCESS_KEY: ${{ secrets.NUXT_PUBLIC_OPS_ACCESS_KEY }}
          NUXT_PUBLIC_OPS_ACCESS_KEY_HASH: ${{ secrets.NUXT_PUBLIC_OPS_ACCESS_KEY_HASH }}
          NUXT_PUBLIC_PAY_LISTING_FEE_URL: ${{ secrets.NUXT_PUBLIC_PAY_LISTING_FEE_URL }}
          NUXT_PUBLIC_PAY_PRO_SELLER_URL: ${{ secrets.NUXT_PUBLIC_PAY_PRO_SELLER_URL }}
          NUXT_PUBLIC_PAY_ORDER_DEPOSIT_URL: ${{ secrets.NUXT_PUBLIC_PAY_ORDER_DEPOSIT_URL }}
        run: npm run build

      - name: Generate sitemap and robots.txt for search engines
        env:
          NUXT_PUBLIC_SITE_URL: https://www.bcpoweraudio.com
        run: node scripts/generate-bc-sitemap.cjs

      - name: Add CNAME (must match GitHub Pages custom domain exactly)
        run: echo 'www.bcpoweraudio.com' > .output/public/CNAME

      - name: Deploy to cwfranks77/bcpoweraudio
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .output/public
          repository-name: cwfranks77/bcpoweraudio
          branch: gh-pages
          clean: true
          token: ${{ secrets.BC_DEPLOY_PAT }}

      - name: Sync GitHub Pages domain and Enforce HTTPS
        env:
          GH_TOKEN: ${{ secrets.BC_DEPLOY_PAT }}
        run: node scripts/configure-bcpoweraudio-github-pages.cjs
