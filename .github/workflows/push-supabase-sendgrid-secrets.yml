name: Push SendGrid secrets to Supabase

on:
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: Set SendGrid Edge secrets for auth email hook
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          SENDGRID_FROM_EMAIL: ${{ secrets.SENDGRID_FROM_EMAIL }}
          SENDGRID_FROM_NAME: ${{ secrets.SENDGRID_FROM_NAME }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "Missing SUPABASE_ACCESS_TOKEN in GitHub Actions secrets."
            exit 1
          fi
          if [ -z "$SENDGRID_API_KEY" ]; then
            echo "Missing SENDGRID_API_KEY — add at GitHub repo Secrets → Actions."
            exit 1
          fi
          args=(
            "SENDGRID_API_KEY=$SENDGRID_API_KEY"
            "SENDGRID_FROM_EMAIL=${SENDGRID_FROM_EMAIL:-info@thefranksstandard.com}"
            "SENDGRID_FROM_NAME=${SENDGRID_FROM_NAME:-The Franks Standard}"
            "SITE_URL=https://thefranksstandard.com"
          )
          npx supabase@latest secrets set "${args[@]}" --project-ref rochesyrxiyrxhzmkuwk
          echo "SendGrid secrets pushed to Supabase Edge (auth-send-email)."
