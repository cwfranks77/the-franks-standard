name: Deploy Supabase Edge Functions

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/deploy-supabase-functions.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Refresh SendGrid secrets (signup / auth email)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          SENDGRID_FROM_EMAIL: ${{ secrets.SENDGRID_FROM_EMAIL }}
          SENDGRID_FROM_NAME: ${{ secrets.SENDGRID_FROM_NAME }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "Missing SUPABASE_ACCESS_TOKEN"
            exit 1
          fi
          if [ -z "$SENDGRID_API_KEY" ]; then
            echo "Skip SendGrid — add SENDGRID_API_KEY to GitHub Secrets (starts with SG.)"
          else
            npx supabase@latest secrets set \
              "SENDGRID_API_KEY=${SENDGRID_API_KEY}" \
              "SENDGRID_FROM_EMAIL=${SENDGRID_FROM_EMAIL:-info@thefranksstandard.com}" \
              "SENDGRID_FROM_NAME=${SENDGRID_FROM_NAME:-The Franks Standard}" \
              "SITE_URL=https://thefranksstandard.com" \
              --project-ref rochesyrxiyrxhzmkuwk
            echo "SendGrid secrets updated on Supabase Edge."
          fi

      - name: Sync ops unlock phrase to Edge (owner console on static sites)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          OPS_ACCESS_KEY: ${{ secrets.NUXT_PUBLIC_OPS_ACCESS_KEY }}
          OPS_ACCESS_KEY_HASH: ${{ secrets.NUXT_PUBLIC_OPS_ACCESS_KEY_HASH }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            exit 1
          fi
          if [ -z "$OPS_ACCESS_KEY" ] && [ -z "$OPS_ACCESS_KEY_HASH" ]; then
            echo "Skip — set NUXT_PUBLIC_OPS_ACCESS_KEY or _HASH in GitHub Secrets"
          else
            npx supabase@latest secrets set \
              "OPS_ACCESS_KEY=${OPS_ACCESS_KEY}" \
              "NUXT_PUBLIC_OPS_ACCESS_KEY=${OPS_ACCESS_KEY}" \
              "NUXT_PUBLIC_OPS_ACCESS_KEY_HASH=${OPS_ACCESS_KEY_HASH}" \
              --project-ref rochesyrxiyrxhzmkuwk
            echo "Ops unlock secrets synced to Supabase Edge."
          fi

      - name: Sync B&C voice owner phone to Edge
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          BC_VOICE_OWNER_PHONE: ${{ secrets.PRIVATE_OWNER_CELL_PHONE }}
          BC_VOICE_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            exit 1
          fi
          VOICE_SECRETS=""
          if [ -n "$BC_VOICE_OWNER_PHONE" ]; then
            VOICE_SECRETS="BC_VOICE_OWNER_PHONE=${BC_VOICE_OWNER_PHONE} TWILIO_BC_CALLER_ID=+18337224147"
          else
            echo "Skip owner cell — add PRIVATE_OWNER_CELL_PHONE to GitHub Secrets for press-0 routing"
          fi
          if [ -n "$BC_VOICE_OPENAI_API_KEY" ]; then
            VOICE_SECRETS="${VOICE_SECRETS} BC_VOICE_OPENAI_API_KEY=${BC_VOICE_OPENAI_API_KEY}"
          else
            echo "Skip OpenAI — add OPENAI_API_KEY to GitHub Secrets for full phone AI (smart fallback still runs)"
          fi
          if [ -n "$VOICE_SECRETS" ]; then
            # shellcheck disable=SC2086
            npx supabase@latest secrets set $VOICE_SECRETS --project-ref rochesyrxiyrxhzmkuwk
            echo "B&C voice secrets synced to Supabase Edge."
          fi

      - name: Set Auth Send Email hook secret on Edge
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SEND_EMAIL_HOOK_SECRET: ${{ secrets.SEND_EMAIL_HOOK_SECRET }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            exit 1
          fi
          if [ -z "$SEND_EMAIL_HOOK_SECRET" ]; then
            echo "Skip — add SEND_EMAIL_HOOK_SECRET from Supabase Auth → Hooks → Send Email (Generate Secret)"
          else
            npx supabase@latest secrets set \
              "SEND_EMAIL_HOOK_SECRET=${SEND_EMAIL_HOOK_SECRET}" \
              --project-ref rochesyrxiyrxhzmkuwk
            echo "Hook secret set on auth-send-email."
          fi

      - name: Deploy edge functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          REF=rochesyrxiyrxhzmkuwk
          npx supabase@latest link --project-ref "$REF"
          deploy () { npx supabase@latest functions deploy "$1" --project-ref "$REF" "${@:2}"; }
          # Public / webhook (no JWT)
          deploy submit-contact --no-verify-jwt
          deploy submit-authenticity-report --no-verify-jwt
          deploy ebay-seller-preview --no-verify-jwt
          deploy ebay-prospect-skim --no-verify-jwt
          deploy promo-availability --no-verify-jwt
          deploy redeem-promo-code --no-verify-jwt
          deploy stripe-webhook --no-verify-jwt
          deploy bc-dropship-checkout --no-verify-jwt
          deploy inventory-source-dispatch --no-verify-jwt
          deploy inventory-source-webhook --no-verify-jwt
          deploy reconcile-orders --no-verify-jwt
          deploy tax-inspect-session --no-verify-jwt
          deploy ops-force-refund --no-verify-jwt
          deploy ops-integrity-action --no-verify-jwt
          deploy ops-cms-action --no-verify-jwt
          deploy bc-voice-inbound --no-verify-jwt
          deploy ops-error-ingest --no-verify-jwt
          deploy ops-incident-action --no-verify-jwt
          deploy ops-session --no-verify-jwt
          deploy ops-owner-feed --no-verify-jwt
          deploy platform-log-activity --no-verify-jwt
          deploy verify-coa-serial --no-verify-jwt
          deploy auth-send-email --no-verify-jwt
          # Authenticated (JWT required)
          deploy create-checkout-session
          deploy stripe-connect-onboard
          deploy stripe-connect-sync
          deploy confirm-order-receipt
          deploy mark-order-shipped
          deploy place-bid
          deploy create-platform-checkout-session
          deploy accept-seller-policies
          deploy issue-coa-certificate
