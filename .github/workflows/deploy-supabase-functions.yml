name: Deploy Supabase Edge Functions

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/deploy-supabase-functions.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy edge functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          npx supabase@latest link --project-ref rochesyrxiyrxhzmkuwk
          npx supabase@latest functions deploy ebay-seller-preview --no-verify-jwt
          npx supabase@latest functions deploy promo-availability --no-verify-jwt
          npx supabase@latest functions deploy redeem-promo-code --no-verify-jwt
          npx supabase@latest functions deploy create-checkout-session
          npx supabase@latest functions deploy stripe-webhook --no-verify-jwt
          npx supabase@latest functions deploy stripe-connect-onboard
          npx supabase@latest functions deploy confirm-order-receipt
          npx supabase@latest functions deploy mark-order-shipped
          npx supabase@latest functions deploy place-bid
          npx supabase@latest functions deploy inventory-source-dispatch --no-verify-jwt
          npx supabase@latest functions deploy inventory-source-webhook --no-verify-jwt
          npx supabase@latest functions deploy reconcile-orders --no-verify-jwt
          npx supabase@latest functions deploy create-platform-checkout-session
          npx supabase@latest functions deploy tax-inspect-session --no-verify-jwt
