# Weekly Petra prodlist download + catalog rebuild + auto-commit
name: Weekly Petra catalog refresh

on:
  schedule:
    # Mondays 10:00 UTC
    - cron: '0 10 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-catalog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Download Petra prodlist
        env:
          PETRA_FTP_HOST: ${{ secrets.PETRA_FTP_HOST }}
          PETRA_FTP_USER: ${{ secrets.PETRA_FTP_USER }}
          PETRA_FTP_PASSWORD: ${{ secrets.PETRA_FTP_PASSWORD }}
          PETRA_FTP_REMOTE_PATH: ${{ secrets.PETRA_FTP_REMOTE_PATH }}
          PETRA_PRODLIST_URL: ${{ secrets.PETRA_PRODLIST_URL }}
        run: node scripts/fetch-petra-prodlist.cjs
        continue-on-error: true

      - name: Import Petra + Brandy sporting catalogs
        run: |
          node scripts/import-petra-prodlist.cjs --csv prodlist.csv || node scripts/import-petra-prodlist.cjs
          node scripts/import-brandy-sporting.cjs

      - name: Commit catalog updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/catalog/petra-products.json public/catalog/catalog-index.json public/catalog/brandy-sporting-products.json public/content/products.json content/products.json src/content/products.json data/petra-wholesale-by-sku.json
          if git diff --staged --quiet; then
            echo "No catalog changes."
          else
            git commit -m "chore(catalog): weekly Petra + Brandy sporting refresh"
            git push
          fi

      - name: Trigger B&C deploy
        if: success()
        env:
          GH_TOKEN: ${{ secrets.BC_DEPLOY_PAT }}
        run: gh workflow run deploy-bcpoweraudio-site.yml
