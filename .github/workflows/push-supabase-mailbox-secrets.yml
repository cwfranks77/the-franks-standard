name: Push mailbox SMTP secrets to Supabase

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - '.github/workflows/push-supabase-mailbox-secrets.yml'
      - 'scripts/push-mailbox-secrets-to-supabase.cjs'

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: Set mailbox SMTP secrets on Supabase Edge
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SMTP_USER: ${{ secrets.MAILBOX_SMTP_USER }}
          SMTP_PASS: ${{ secrets.MAILBOX_SMTP_PASSWORD }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "Missing SUPABASE_ACCESS_TOKEN"
            exit 1
          fi
          if [ -z "$SMTP_PASS" ]; then
            echo "Missing MAILBOX_SMTP_PASSWORD in GitHub Secrets — run npm run mail:push-supabase locally once"
            exit 0
          fi
          USER="${SMTP_USER:-info@thefranksstandard.com}"
          npx supabase@latest secrets set \
            "SMTP_HOST=mail.privateemail.com" \
            "SMTP_PORT=587" \
            "SMTP_USER=${USER}" \
            "SMTP_PASS=${SMTP_PASS}" \
            "SMTP_FROM=${USER}" \
            "SMTP_FROM_NAME=The Franks Standard" \
            "SITE_URL=https://thefranksstandard.com" \
            --project-ref rochesyrxiyrxhzmkuwk
          echo "Mailbox SMTP secrets updated on Supabase Edge."
