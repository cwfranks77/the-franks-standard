name: Push eBay API secrets to Supabase

on:
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: Set Supabase Edge secrets (eBay Browse API)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
        run: |
          if [ -z "$EBAY_CLIENT_ID" ] || [ -z "$EBAY_CLIENT_SECRET" ]; then
            echo "Missing GitHub secrets EBAY_CLIENT_ID or EBAY_CLIENT_SECRET."
            echo "Run: npm run ebay:setup (or scripts/setup-ebay-api.ps1) with your eBay Production keys."
            exit 1
          fi
          npx supabase@latest secrets set \
            "EBAY_CLIENT_ID=$EBAY_CLIENT_ID" \
            "EBAY_CLIENT_SECRET=$EBAY_CLIENT_SECRET" \
            EBAY_MARKETPLACE_ID=EBAY_US \
            EBAY_API_ENV=production \
            --project-ref rochesyrxiyrxhzmkuwk
          echo "eBay API secrets pushed to Supabase (rochesyrxiyrxhzmkuwk)."
