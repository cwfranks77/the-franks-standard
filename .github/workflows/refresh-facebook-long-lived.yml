name: Refresh Facebook long-lived Page token

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FACEBOOK_APP_ID: ${{ secrets.FACEBOOK_APP_ID }}
      FACEBOOK_APP_SECRET: ${{ secrets.FACEBOOK_APP_SECRET }}
      FACEBOOK_USER_ACCESS_TOKEN: ${{ secrets.FACEBOOK_USER_ACCESS_TOKEN }}
      FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm install --no-audit --no-fund

      - name: Exchange for long-lived Page token
        run: node scripts/exchange-facebook-page-token.cjs --output-file page-token.txt

      - uses: actions/upload-artifact@v4
        with:
          name: facebook-page-token
          path: page-token.txt
          retention-days: 1
