name: Run ads (organic + optional Meta paid)

on:
  workflow_dispatch:
    inputs:
      campaign:
        description: Campaign copy set
        required: true
        default: security
        type: choice
        options:
          - security
          - default
          - founders
          - honor
      meta_paid:
        description: Also create Meta paid campaign (requires META_AD_ACCOUNT_ID)
        required: false
        default: false
        type: boolean
      meta_live:
        description: META_ADS_LIVE=1 (false = dry-run paid only)
        required: false
        default: false
        type: boolean
      export_copy:
        description: Export Reddit/Google copy to assets/paid-ads-export/
        required: false
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: run-paid-ads
  cancel-in-progress: false

jobs:
  ads:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
      TELEGRAM_NOTIFY_CHAT_ID: ${{ secrets.TELEGRAM_NOTIFY_CHAT_ID }}
      FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
      FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
      FACEBOOK_USER_ACCESS_TOKEN: ${{ secrets.FACEBOOK_USER_ACCESS_TOKEN }}
      INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
      X_API_KEY: ${{ secrets.X_API_KEY }}
      X_API_SECRET: ${{ secrets.X_API_SECRET }}
      X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
      X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
      META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
      META_AD_ACCESS_TOKEN: ${{ secrets.META_AD_ACCESS_TOKEN }}
      META_ADS_DAILY_BUDGET_USD: ${{ secrets.META_ADS_DAILY_BUDGET_USD }}
      META_ADS_STATUS: ${{ secrets.META_ADS_STATUS }}
      ADS_CAMPAIGN: ${{ github.event.inputs.campaign }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm install --no-audit --no-fund

      - name: Export Reddit/Google copy
        if: github.event.inputs.export_copy == 'true'
        run: node scripts/run-paid-ads.cjs --export-reddit-google --skip-organic --campaign ${{ github.event.inputs.campaign }}

      - name: Organic posts (Telegram, Facebook, Instagram, X)
        continue-on-error: true
        run: |
          FLAG=""
          case "${{ github.event.inputs.campaign }}" in
            founders) FLAG="--founders" ;;
            honor) FLAG="--honor" ;;
            security) FLAG="--security" ;;
          esac
          node scripts/post-franks-social.cjs $FLAG

      - name: Meta paid ads
        if: github.event.inputs.meta_paid == 'true'
        continue-on-error: true
        env:
          META_ADS_LIVE: ${{ github.event.inputs.meta_live && '1' || '0' }}
          META_ADS_CAMPAIGN: ${{ github.event.inputs.campaign }}
        run: |
          EXTRA="--dry-run"
          if [ "${{ github.event.inputs.meta_live }}" = "true" ]; then EXTRA=""; fi
          node scripts/run-meta-paid-ads.cjs --campaign=${{ github.event.inputs.campaign }} $EXTRA
