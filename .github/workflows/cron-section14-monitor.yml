name: Section 14 post-launch monitor

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Post-launch health monitor (every 10 min)
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "Skip — add CRON_SECRET to GitHub Secrets"
            exit 0
          fi
          curl -fsS -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "x-cron-secret: ${CRON_SECRET}" \
            "https://rochesyrxiyrxhzmkuwk.supabase.co/functions/v1/cron-post-launch-monitor"
