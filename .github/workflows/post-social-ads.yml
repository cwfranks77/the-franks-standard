name: Post Franks Social Ads

on:
  workflow_dispatch:
  schedule:
    # Mon/Wed/Fri at 9:00 AM America/Chicago (14:00 UTC during standard time)
    - cron: "0 14 * * 1,3,5"

permissions:
  contents: read

concurrency:
  group: post-franks-social
  cancel-in-progress: false

jobs:
  post-social:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
      FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
      FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
      FACEBOOK_USER_ACCESS_TOKEN: ${{ secrets.FACEBOOK_USER_ACCESS_TOKEN }}
      X_API_KEY: ${{ secrets.X_API_KEY }}
      X_API_SECRET: ${{ secrets.X_API_SECRET }}
      X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
      X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Post to Telegram
        continue-on-error: true
        run: node scripts/post-franks-social.cjs --telegram

      - name: Validate Facebook token
        continue-on-error: true
        run: node scripts/validate-facebook-setup.cjs

      - name: Post to Facebook
        continue-on-error: true
        run: node scripts/post-franks-social.cjs --facebook

      - name: Post to X
        continue-on-error: true
        run: node scripts/post-franks-social.cjs --x
