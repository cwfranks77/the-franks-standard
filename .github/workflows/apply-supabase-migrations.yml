name: Apply Supabase migrations

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'supabase/migrations/**'
      - 'scripts/ensure-bc-site-marketing-table.sql'
      - '.github/workflows/apply-supabase-migrations.yml'

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Link Supabase project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: npx supabase@latest link --project-ref rochesyrxiyrxhzmkuwk

      - name: Ensure B&C SEO table exists (direct SQL)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: npx supabase@latest db query --file scripts/ensure-bc-site-marketing-table.sql --linked

      - name: Push pending SQL migrations (best effort)
        continue-on-error: true
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: npx supabase@latest db push --yes --include-all
