name: Section 10 cron jobs

on:
  schedule:
    - cron: '0 4 * * 0'
  workflow_dispatch:

jobs:
  run-cron:
    runs-on: ubuntu-latest
    steps:
      - name: Log retention cleanup (180 days)
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "Skip — add CRON_SECRET to GitHub Secrets"
            exit 0
          fi
          curl -fsS -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "x-cron-secret: ${CRON_SECRET}" \
            "https://rochesyrxiyrxhzmkuwk.supabase.co/functions/v1/cron-log-cleanup"

      - name: Process background job queue
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "x-cron-secret: ${CRON_SECRET}" \
            "https://rochesyrxiyrxhzmkuwk.supabase.co/functions/v1/cron-process-jobs"
