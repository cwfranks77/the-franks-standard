# Publishes the Nuxt static build with GitHub's official Pages Actions (reliable).
#
# ONE-TIME SETUP (repo owner — fixes "site not found" / 404):
# 1. GitHub → cwfranks77/the-franks-standard → Settings → Pages
# 2. Under "Build and deployment", set Source to: GitHub Actions (NOT "Deploy from branch").
# 3. Save. Custom domain thefranksstandard.com should stay as configured; DNS CNAME/A per GitHub docs.
# 4. Re-run this workflow from the Actions tab if the first run was before Pages source was switched.
#
# Local fallback (pushes gh-pages branch): npm run deploy:gh-pages
name: Deploy Franks Standard to GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - 'franks-standard/**'
      - '.github/workflows/deploy-gh-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-franks-standard
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install
        working-directory: franks-standard
        run: npm install --no-audit --no-fund

      - name: Generate static site
        working-directory: franks-standard
        env:
          NUXT_PUBLIC_SITE_URL: https://thefranksstandard.com
          NUXT_PUBLIC_OPS_ACCESS_KEY: ${{ secrets.NUXT_PUBLIC_OPS_ACCESS_KEY }}
        run: npm run generate

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: franks-standard/.output/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Optional Telegram ping
        continue-on-error: true
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_NOTIFY_CHAT_ID: ${{ secrets.TELEGRAM_NOTIFY_CHAT_ID }}
        run: 'node scripts/notify-telegram.cjs "The Franks Standard: deployed. ${{ steps.deployment.outputs.page_url }}"'
