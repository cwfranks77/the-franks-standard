name: Section 13 search indexing

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Index mode (listings, stores, all)'
        required: false
        default: 'all'

jobs:
  index-search:
    runs-on: ubuntu-latest
    steps:
      - name: Index listings (every 5 min)
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then echo "Skip — add CRON_SECRET"; exit 0; fi
          curl -fsS -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "x-cron-secret: ${CRON_SECRET}" \
            -H "Content-Type: application/json" \
            -d '{"mode":"listings"}' \
            "https://rochesyrxiyrxhzmkuwk.supabase.co/functions/v1/cron-search-index"

      - name: Index stores (every 10 min — even minutes only)
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then exit 0; fi
          MIN=$(date -u +%M)
          if [ $((10#${MIN} % 2)) -ne 0 ]; then echo "Skip stores — odd minute"; exit 0; fi
          curl -fsS -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "x-cron-secret: ${CRON_SECRET}" \
            -H "Content-Type: application/json" \
            -d '{"mode":"stores"}' \
            "https://rochesyrxiyrxhzmkuwk.supabase.co/functions/v1/cron-search-index"
