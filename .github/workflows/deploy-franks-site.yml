# Publishes the Franks Standard static site to GitHub Pages (thefranksstandard.com).
name: Deploy Franks site

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - '.github/workflows/deploy-franks-site.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-franks
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout gh-pages (verified static build)
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
