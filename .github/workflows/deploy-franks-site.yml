# Publishes the Franks Standard static site to GitHub Pages (thefranksstandard.com).
name: Deploy Franks site

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'franks-standard/**'
      - 'public/img/**'
      - 'assets/**'
      - 'tailwind.config.cjs'
      - 'app.vue'
      - 'nuxt.config.ts'
      - 'package.json'
      - 'middleware/**'
      - 'scripts/inject-spa-fallback.cjs'
      - 'scripts/patch-gh-pages-spa.cjs'
      - 'scripts/merge-project-components.cjs'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-franks
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install
        run: npm install --no-audit --no-fund

      - name: Build static site
        env:
          NUXT_PUBLIC_SITE_URL: https://thefranksstandard.com
          NUXT_PUBLIC_SUPABASE_URL: ${{ secrets.NUXT_PUBLIC_SUPABASE_URL }}
          NUXT_PUBLIC_SUPABASE_KEY: ${{ secrets.NUXT_PUBLIC_SUPABASE_KEY }}
          NUXT_PUBLIC_OPS_ACCESS_KEY: ${{ secrets.NUXT_PUBLIC_OPS_ACCESS_KEY }}
          NUXT_PUBLIC_OPS_ACCESS_KEY_HASH: ${{ secrets.NUXT_PUBLIC_OPS_ACCESS_KEY_HASH }}
          NUXT_PUBLIC_BRANDY_STORE_ON_HOLD: 'true'
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
